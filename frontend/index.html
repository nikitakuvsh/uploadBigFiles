<!DOCTYPE html>
<html>
<head>
    <title>Big File Upload</title>
    <link rel="stylesheet" href="style.css">

    <!-- Lottie -->
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>
</head>
<body>

<div class="container">
    <div class="upload-card" id="dropZone">
        <!-- Новая Lottie-анимация -->
        <dotlottie-wc
            src="https://lottie.host/b5489083-92f5-44aa-82b9-5f31dd657cf1/oJyidUBUJi.lottie"
            style="width: 300px; height: 300px; margin: 0 auto; display: block;"
            autoplay
            loop>
        </dotlottie-wc>

        <h2>Перетащите файл</h2>
        <p>или кликните для выбора</p>

        <input type="file" id="fileInput" hidden />

        <div id="fileName">Файл не выбран</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="progressText"></div>

        <button id="uploadBtn">Загрузить</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
